{% extends 'gestion/base.html' %}
{% block content %}

<div class="page-header">
    <h2><i class="bi bi-camera-reels"></i> {{ pelicula.titulo }}</h2>
</div>

<div class="card p-4">
    <table class="table table-borderless mb-0">
        <tr>
            <td class="text-muted" style="width:150px;">Título</td>
            <td class="text-white fw-semibold">{{ pelicula.titulo }}</td>
        </tr>
        <tr>
            <td class="text-muted">Año</td>
            <td>{{ pelicula.anio_estreno }}</td>
        </tr>
        <tr>
            <td class="text-muted">Género</td>
            <td>{{ pelicula.get_genero_display }}</td>
        </tr>
        <tr>
            <td class="text-muted">Director</td>
            <td>
                <a href="{% url 'director_detail' pelicula.director.pk %}" style="color:#f4a261;">
                    {{ pelicula.director.nombre }}
                </a>
            </td>
        </tr>
    </table>
</div>

<div class="d-flex gap-2 mt-3">
    <a href="{% url 'pelicula_update' pelicula.pk %}" class="btn btn-warning">
        <i class="bi bi-pencil"></i> Editar
    </a>
    <a href="{% url 'pelicula_delete' pelicula.pk %}" class="btn btn-outline-danger">
        <i class="bi bi-trash"></i> Eliminar
    </a>
    <a href="{% url 'pelicula_list' %}" class="btn btn-outline-secondary ms-auto">
        <i class="bi bi-arrow-left"></i> Volver
    </a>
</div>

{% endblock %}
