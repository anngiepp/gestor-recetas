{% extends 'gestion/base.html' %}
{% block content %}

<div class="page-header">
    <h2><i class="bi bi-film"></i> {{ titulo }}</h2>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger" style="font-size:.85rem;">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Guardar
                    </button>
                    <a href="{% url 'pelicula_list' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
