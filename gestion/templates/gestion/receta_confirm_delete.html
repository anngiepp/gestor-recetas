{% extends 'gestion/base.html' %}
{% block content %}

<div class="page-header">
    <h2><i class="bi bi-exclamation-triangle"></i> Eliminar Receta</h2>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <i class="bi bi-trash3" style="font-size:3rem; color:#c0392b;"></i>
            <h4 class="mt-3">¿Eliminar <strong>"{{ receta.nombre }}"</strong>?</h4>
            <p class="text-muted">Esta acción no se puede deshacer.</p>
            <div class="d-flex justify-content-center gap-3 mt-3">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Sí, eliminar
                    </button>
                </form>
                <a href="{% url 'receta_list' %}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
