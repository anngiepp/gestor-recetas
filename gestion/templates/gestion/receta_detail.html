{% extends 'gestion/base.html' %}
{% block content %}

<div class="page-header">
    <h2><i class="bi bi-journal-text"></i> {{ receta.nombre }}</h2>
</div>

<div class="card p-4">
    <table class="table table-borderless mb-0">
        <tr>
            <td class="fw-semibold text-muted" style="width:200px;">Nombre</td>
            <td class="fw-semibold fs-5">{{ receta.nombre }}</td>
        </tr>
        <tr>
            <td class="fw-semibold text-muted">Categoría</td>
            <td>
                <a href="{% url 'categoria_detail' receta.categoria.pk %}" style="color:#c0392b;">
                    {{ receta.categoria.nombre }}
                </a>
            </td>
        </tr>
        <tr>
            <td class="fw-semibold text-muted">Tiempo de preparación</td>
            <td><i class="bi bi-clock"></i> {{ receta.tiempo_preparacion }} minutos</td>
        </tr>
        <tr>
            <td class="fw-semibold text-muted">Ingredientes</td>
            <td style="white-space: pre-line;">{{ receta.ingredientes }}</td>
        </tr>
    </table>
</div>

<div class="d-flex gap-2 mt-3">
    <a href="{% url 'receta_update' receta.pk %}" class="btn btn-warning">
        <i class="bi bi-pencil"></i> Editar
    </a>
    <a href="{% url 'receta_delete' receta.pk %}" class="btn btn-outline-danger">
        <i class="bi bi-trash"></i> Eliminar
    </a>
    <a href="{% url 'receta_list' %}" class="btn btn-outline-secondary ms-auto">
        <i class="bi bi-arrow-left"></i> Volver
    </a>
</div>

{% endblock %}
