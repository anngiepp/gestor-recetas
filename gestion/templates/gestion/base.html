<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍴 RecetaApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #fff8f0; color: #3d2b1f; }
        .navbar { background: #c0392b; }
        .navbar-brand { color: #fff !important; font-size: 1.5rem; font-weight: bold; }
        .nav-link { color: #ffe0d0 !important; }
        .nav-link:hover { color: #fff !important; }
        .card { background: #fff; border: 1px solid #f5cba7; color: #3d2b1f; }
        .form-control, .form-select { background: #fff; border: 1px solid #f5cba7; color: #3d2b1f; }
        .form-control:focus, .form-select:focus { border-color: #c0392b; box-shadow: none; }
        .table { color: #3d2b1f; }
        .table thead th { background: #c0392b; color: #fff; }
        .table tbody tr:hover { background: #fff3e0; }
        .btn-primary { background: #c0392b; border-color: #c0392b; }
        .btn-primary:hover { background: #a93226; border-color: #a93226; }
        .page-header { background: #fff; border-left: 5px solid #c0392b; padding: 1rem 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .page-header h2 { color: #c0392b; margin: 0; }
        footer { border-top: 1px solid #f5cba7; color: #aaa; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'receta_list' %}">🍴 RecetaApp</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'receta_list' %}">
                        <i class="bi bi-journal-richtext"></i> Recetas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'categoria_list' %}">
                        <i class="bi bi-tags"></i> Categorías
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    {% block content %}{% endblock %}
</div>

<footer class="text-center py-3 mt-4">
    <p class="mb-0">🍴 RecetaApp — TECSUP</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
