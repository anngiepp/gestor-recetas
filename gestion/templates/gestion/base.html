<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 CineGestor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; }
        .navbar { background: #1a1a2e; border-bottom: 2px solid #e63946; }
        .navbar-brand { color: #e63946 !important; font-size: 1.5rem; font-weight: bold; }
        .nav-link { color: #e0e0e0 !important; }
        .nav-link:hover { color: #e63946 !important; }
        .card { background: #1a1a2e; border: 1px solid #2a2a4a; color: #e0e0e0; }
        .form-control, .form-select { background: #111; border: 1px solid #333; color: #fff; }
        .form-control:focus, .form-select:focus { background: #111; color: #fff; border-color: #e63946; box-shadow: none; }
        .table { color: #e0e0e0; }
        .table thead th { background: #16213e; color: #f4a261; }
        .btn-primary { background: #e63946; border-color: #e63946; }
        .btn-primary:hover { background: #c1121f; border-color: #c1121f; }
        .page-header { background: #1a1a2e; border-left: 5px solid #e63946; padding: 1rem 1.5rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'pelicula_list' %}">🎬 CineGestor</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'pelicula_list' %}">
                        <i class="bi bi-film"></i> Películas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'director_list' %}">
                        <i class="bi bi-person-video2"></i> Directores
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
